<html lang="en">
<head>
	<meta charset="UTF-8">

<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">




	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
	<style>
		:root {
			--dark-green: #1e3328;
			--green-mid: #2e4635;
			--peach: #ffd6ba;
			--peach-light: #fff0e6;
			--mocha: #b7a99a;
			--text: #1e3328;
			--bg: #f6f5f3;
			--checkbox-bg: #e6e1dd;
			--checkbox-border: #b7a99a;
			--checkbox-checked: #2e4635;
		}

		*, *::before, *::after { box-sizing: border-box; }

		html, body {
			margin: 0; padding: 0;
			background: var(--bg);
			color: var(--text);
			font-family: 'DM Sans', sans-serif;
		}

		/* ── CREDIT BAR ── */
		.credit-bar {
			width: 100%;
			background: var(--dark-green);
			color: rgba(255,255,255,0.55);
			text-align: center;
			font-size: 0.72rem;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			padding: 0.45rem 0;
		}
		.credit-bar a {
			color: var(--peach);
			text-decoration: none;
			font-weight: 500;
			transition: opacity 0.2s;
		}
		.credit-bar a:hover { opacity: 0.75; }

		/* ── HEADER ── */
		.site-header {
			width: 100%;
			background: var(--dark-green);
			padding: 1.4rem 2rem 1.6rem;
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 1rem;
			position: relative;
		}

		/* Subtle decorative arc */
		.site-header::after {
			content: '';
			position: absolute;
			bottom: -28px;
			left: 0; right: 0;
			height: 30px;
			background: var(--dark-green);
			border-radius: 0 0 50% 50% / 0 0 100% 100%;
			z-index: 0;
		}

		.header-left {
			display: flex;
			flex-direction: column;
			gap: 0.15rem;
		}

		.header-eyebrow {
			font-size: 0.65rem;
			letter-spacing: 0.2em;
			text-transform: uppercase;
			color: var(--peach);
			opacity: 0.7;
			font-family: 'DM Sans', sans-serif;
		}

		h1 {
			margin: 0;
			font-family: 'Playfair Display', Georgia, serif;
			font-size: clamp(1.6rem, 4vw, 2.4rem);
			font-weight: 900;
			color: #fff;
			line-height: 1;
			letter-spacing: -0.02em;
		}

		h1 span {
			color: var(--peach);
		}

		/* Stats pill */
		.stats {
			display: flex;
			align-items: center;
			gap: 0.5rem;
			background: rgba(255,255,255,0.08);
			border: 1px solid rgba(255,214,186,0.2);
			padding: 0.55rem 1.1rem;
			border-radius: 999px;
			color: #fff;
			font-size: 0.85rem;
			white-space: nowrap;
		}
		.stats-dot {
			width: 7px; height: 7px;
			border-radius: 50%;
			background: var(--peach);
			animation: pulse 2s ease-in-out infinite;
		}
		@keyframes pulse {
			0%, 100% { opacity: 1; transform: scale(1); }
			50% { opacity: 0.4; transform: scale(0.75); }
		}
		#checked-counter, #click-counter, #your-click-counter {
			font-family: 'Playfair Display', serif;
			font-weight: 700;
			font-size: 1rem;
			color: var(--peach);
		}

		/* Auth section */
		#auth-section {
			display: flex;
			align-items: center;
			gap: 0.6rem;
			font-size: 0.85rem;
			color: rgba(255,255,255,0.65);
		}
		.auth-btn {
			display: inline-block;
			padding: 0.45rem 1rem;
			background: var(--peach);
			color: var(--dark-green);
			font-weight: 700;
			font-size: 0.8rem;
			letter-spacing: 0.06em;
			text-transform: uppercase;
			text-decoration: none;
			border-radius: 999px;
			transition: background 0.2s, transform 0.15s;
		}
		.auth-btn:hover {
			background: #ffead5;
			transform: translateY(-1px);
		}

		/* ── FLOATING ERROR ── */
		#error-message {
			display: none;
			position: fixed;
			top: 1.5rem;
			left: 50%;
			transform: translateX(-50%) translateY(12px);
			z-index: 999;
			background: #fff8f5;
			color: #7a2e1e;
			border: 1.5px solid #f4c0aa;
			border-left: 4px solid #e05c35;
			padding: 0.75rem 1.4rem;
			border-radius: 0.75rem;
			font-size: 0.9rem;
			font-weight: 500;
			max-width: 90vw;
			text-align: center;
			box-shadow: 0 8px 32px rgba(0,0,0,0.12);
			opacity: 0;
			transition: opacity 0.25s ease, transform 0.25s ease;
			pointer-events: none;
		}
		#error-message.visible {
			opacity: 1;
			transform: translateX(-50%) translateY(0);
			pointer-events: auto;
		}

		/* ── CHECKBOXES ── */
		body > #con {
			position: relative;
			max-width: 95vw;
			margin: 3.5rem auto 3rem;
		}
		input[type="checkbox"] {
			width: 14px; height: 14px; margin: 0;
			accent-color: var(--checkbox-checked);
			cursor: pointer;
			position: absolute;
		}

		/* ── MOBILE ── */
		@media (max-width: 600px) {
			.site-header {
				flex-wrap: wrap;
				gap: 0.75rem;
				padding: 1.2rem 1.2rem 1.4rem;
			}
			.header-left { flex: 1 1 auto; }
			.stats { order: 3; flex: 1 1 100%; justify-content: center; }
			#auth-section { order: 2; margin-left: auto; }
		}
	</style>
</head>
<body>

	<!-- Credit bar -->
	<div class="credit-bar">
		made by <a href="https://www.himanshubalani.com" target="_blank">himanshubalani.com</a>
		| Read <a href="https://blog.himanshubalani.com/omcb" target="_blank">Blog</a>
		| Inspired by <a href="https://onemillioncheckboxes.com/" target="_blank">OMCB</a>
	</div>

	<!-- Header -->
	<header class="site-header">
		<div class="header-left">
			<h1>1 <span>Million</span> Checkboxes</h1>
		</div>

		<div class="stats">
			<div class="stats-dot"></div>
			Boxes Checked&nbsp;
			<span id="checked-counter">0</span>
			&nbsp;|&nbsp;
			Total Clicks&nbsp;
			<span id="click-counter">0</span>
			&nbsp;|&nbsp;
			Your Clicks&nbsp;
			<span id="your-click-counter">0</span>
		</div>

		<div id="auth-section"></div>
	</header>

	<!-- Floating error toast -->
	<div id="error-message"></div>

	<!-- Checkboxes -->
	<div id="con"></div>

	<script src="https://cdn.socket.io/4.8.2/socket.io.min.js"></script>
	<script>
		const socket = io();
		const container = document.getElementById("con");
		const errorDiv = document.getElementById("error-message");
		const checkedCounter = document.getElementById("checked-counter");
		const clickCounter = document.getElementById("click-counter");
		const yourClickCounter = document.getElementById("your-click-counter");
		let errorTimeout;

		// Auth
		fetch('/api/user')
			.then((response) => response.json())
			.then((data) => {
				const authDiv = document.getElementById('auth-section');
				if (data.loggedIn) {
					authDiv.innerHTML = `<span>Hi, ${data.user.name || data.user.nickname}</span> <a href="/logout" class="auth-btn">Logout</a>`;
				} else {
					authDiv.innerHTML = `<a href="/login" class="auth-btn">Login</a>`;
				}
			})
			.catch((error) => {
				console.error('Error fetching user data:', error);
			});

		// Floating error toast
		function showError(msg) {
			clearTimeout(errorTimeout);
			errorDiv.textContent = msg;
			errorDiv.style.display = 'block';
			requestAnimationFrame(() => errorDiv.classList.add('visible'));
			errorTimeout = setTimeout(() => {
				errorDiv.classList.remove('visible');
				setTimeout(() => { errorDiv.style.display = 'none'; }, 280);
			}, 3000);
		}

// Virtual scrolling state
		const CELL_SIZE = 16; // 14px box + 2px gap spacing
		let checkboxesData =[]; 
		const visibleCheckboxes = new Map(); 
		let totalCheckboxes = 0;
		let cols = 0;
		let rows = 0;
		let totalCheckedCount = 0;

		function updateCheckboxState(index, checked) {
			if (checkboxesData[index] !== checked) {
				checkboxesData[index] = checked;
				totalCheckedCount += checked ? 1 : -1;
				checkedCounter.textContent = totalCheckedCount.toLocaleString();
			}
			const input = visibleCheckboxes.get(index);
			if (input) input.checked = checked;
		}

		socket.on('server:error', ({ data, revert }) => {
			if (data?.error) showError(data.error);
			if (revert && checkboxesData.length > revert.index) {
				updateCheckboxState(revert.index, revert.checked);
			}
		});

		socket.on('server:checkbox:change', ({ index, checked }) => {
			if (checkboxesData.length > index) {
				updateCheckboxState(index, checked);
			}
		});

		socket.on('server:checkbox:change', ({ index, checked }) => {
			if (checkboxesData.length > index) {
				checkboxesData[index] = checked;
			}
			const input = visibleCheckboxes.get(index);
			if (input) input.checked = checked;
		});

		socket.on('server:analytics:update', ({ totalClicks }) => {
			clickCounter.textContent = totalClicks.toLocaleString();
		});

		socket.on('server:your-clicks:update', ({ yourClicks }) => {
			yourClickCounter.textContent = yourClicks.toLocaleString();
		});

		function initVirtualGrid() {
			// Calculate grid layout based on available window width
			const availableWidth = window.innerWidth * 0.95; 
			cols = Math.floor(availableWidth / CELL_SIZE);
			rows = Math.ceil(totalCheckboxes / cols);
			
			// Define absolute bounds to force native scrollbar
			container.style.width = `${cols * CELL_SIZE}px`;
			container.style.height = `${rows * CELL_SIZE}px`;
			
			renderVisible();
		}

		function renderVisible() {
			const rect = container.getBoundingClientRect();
			const offsetTop = -rect.top;
			const viewPortHeight = window.innerHeight;
			
			const BUFFER = 10; // Number of rows to load above/below the viewport
			
			let startRow = Math.floor(offsetTop / CELL_SIZE) - BUFFER;
			let endRow = Math.floor((offsetTop + viewPortHeight) / CELL_SIZE) + BUFFER;
			
			startRow = Math.max(0, startRow);
			endRow = Math.min(rows - 1, endRow);
			
			const startIndex = startRow * cols;
			const endIndex = Math.min(totalCheckboxes - 1, ((endRow + 1) * cols) - 1);
			
			const newVisible = new Set();
			const fragment = document.createDocumentFragment();
			let added = false;
			
			for (let i = startIndex; i <= endIndex; i++) {
				newVisible.add(i);
				if (!visibleCheckboxes.has(i)) {
					const input = document.createElement('input');
					input.type = 'checkbox';
					input.id = `checkbox-${i}`;
					input.checked = checkboxesData[i] || false;
					
					const c = i % cols;
					const r = Math.floor(i / cols);
					input.style.left = `${c * CELL_SIZE}px`;
					input.style.top = `${r * CELL_SIZE}px`;
					
					input.addEventListener('change', e => {
						updateCheckboxState(i, e.target.checked);
						socket.emit('client:checkbox:change', { index: i, checked: e.target.checked });
					});
					
					fragment.appendChild(input);
					visibleCheckboxes.set(i, input);
					added = true;
				} else {
					// Ensure state is perfectly synced when scrolling back up/down quickly
					const input = visibleCheckboxes.get(i);
					if (input.checked !== checkboxesData[i]) {
						input.checked = checkboxesData[i];
					}
				}
			}
			
			if (added) {
				container.appendChild(fragment);
			}
			
			// Clean up checkboxes that are now outside the visible window + buffer
			for (const [i, input] of visibleCheckboxes.entries()) {
				if (!newVisible.has(i)) {
					container.removeChild(input);
					visibleCheckboxes.delete(i);
				}
			}
		}

		// Use requestAnimationFrame for smooth scrolling performance
		let scrollTicking = false;
		window.addEventListener('scroll', () => {
			if (!scrollTicking) {
				window.requestAnimationFrame(() => {
					renderVisible();
					scrollTicking = false;
				});
				scrollTicking = true;
			}
		});

		// Recalculate positions if window is resized
		let resizeTimer;
		window.addEventListener('resize', () => {
			clearTimeout(resizeTimer);
			resizeTimer = setTimeout(() => {
				for (const input of visibleCheckboxes.values()) {
					container.removeChild(input);
				}
				visibleCheckboxes.clear();
				initVirtualGrid();
			}, 150);
		});

		window.addEventListener('load', async () => {
			const res = await fetch('/checkboxes');
			const data = await res.json();
			if (data?.checkboxes) {
				checkboxesData = data.checkboxes;
				totalCheckboxes = checkboxesData.length;
				
				let initialCount = 0;
				for (let i = 0; i < totalCheckboxes; i++) {
					if (checkboxesData[i]) initialCount++;
				}
				totalCheckedCount = initialCount;
				checkedCounter.textContent = totalCheckedCount.toLocaleString();

				initVirtualGrid();
			}
		});
	</script>
</body>
</html>
