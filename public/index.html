<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>10k Checkboxes</title>
	<style>
		:root {
			--dark-green: #2e4635;
			--peach: #ffd6ba;
			--mocha: #b7a99a;
			--text: #2e4635;
			--bg: #f6f5f3;
			--checkbox-bg: #e6e1dd;
			--checkbox-border: #b7a99a;
			--checkbox-checked: #2e4635;
			--header-bg: #ffd6ba;
		}
		html, body {
			margin: 0; padding: 0;
			background: var(--bg); color: var(--text);
			font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
		}
		body {
			display: flex; flex-direction: column;
			align-items: center; padding: 0 1rem;
		}
		.header-container {
			display: flex; justify-content: space-between; align-items: center;
			width: 100%; max-width: 1000px; padding-top: 1rem;
		}
		h1 {
			background: var(--header-bg); color: var(--dark-green);
			padding: 1rem 2rem; border-radius: 1.5rem;
			font-size: 2rem; font-weight: 700;
			box-shadow: 0 2px 16px 0 rgba(46,70,53,0.07);
		}
		.stats {
			font-size: 1.2rem; font-weight: bold; background: var(--checkbox-bg);
			padding: 0.5rem 1rem; border-radius: 1rem;
		}
		#con {
			display: flex; flex-wrap: wrap; gap: 2px; /* Tighter gap for 10k */
			max-width: 95vw; margin-bottom: 3rem; justify-content: center;
		}
		input[type="checkbox"] {
			width: 14px; height: 14px; margin: 0;
			accent-color: var(--checkbox-checked);
			cursor: pointer;
		}
		.auth-btn {
			padding: 0.5rem 1rem; background: var(--dark-green);
			color: white; text-decoration: none; border-radius: 0.5rem;
		}
		#error-message {
			display: none;
			color: #b94a48;
			background: #ffd6ba;
			border: 1px solid #b7a99a;
			padding: 0.7rem 1.2rem;
			margin-bottom: 1.5rem;
			border-radius: 0.7rem;
			font-size: 1.1rem;
			max-width: 400px;
			text-align: center;
			margin-left: auto;
			margin-right: 1rem;
			margin-top: 1rem;
		}
		.credit-bar {
	width: 100%;
	background: var(--dark-green);
	color: var(--bg);
	text-align: center;
	font-size: 0.8rem;
	padding: 0.3rem 0;
	letter-spacing: 0.05em;
}
.credit-bar a {
	color: var(--peach);
	text-decoration: none;
	font-weight: bold;
}
.credit-bar a:hover {
	text-decoration: underline;
}
	</style>
</head>
<body>
	<div class="credit-bar">
		made by <a href="https://www.himanshubalani.com" target="_blank">himanshubalani.com</a>
	</div>

	<div class="header-container">
		<div class="stats">Total Clicks: <span id="click-counter">0</span></div>
		<h1>1 Million Checkboxes</h1>
		<div id="auth-section">
			<!-- Will be populated by JS -->
		</div>
	</div>

	<div id="error-message" style="display:none;color:#b94a48;background:#ffd6ba;border:1px solid #b7a99a;padding:0.7rem 1.2rem;margin-bottom:1.5rem;border-radius:0.7rem;font-size:1.1rem;text-align:center;"></div>
	<div id="con"></div>

	<script src="/socket.io/socket.io.js"></script>
	<script>
		const socket = io();
		const container = document.getElementById("con");
		const errorDiv = document.getElementById("error-message");
		const clickCounter = document.getElementById("click-counter");

		// Fetch User Info (OIDC)
		fetch('/api/user').then(res => res.json()).then(data => {
			const authDiv = document.getElementById('auth-section');
			if (data.loggedIn) {
				authDiv.innerHTML = `<span>Hi, ${data.user.nickname || data.user.name}</span> <a href="/logout" class="auth-btn">Logout</a>`;
			} else {
				authDiv.innerHTML = `<a href="/login" class="auth-btn">Login</a>`;
			}
		});

		// Server Error / Rate Limit handling
		socket.on('server:error', ({ data, revert }) => {
			if (data.error) {
				errorDiv.textContent = data.error;
				errorDiv.style.display = 'block';
				// Auto hide after 3 seconds
				setTimeout(() => { errorDiv.style.display = 'none'; }, 3000);
			}
			// Revert the checkbox visually if server blocked the request
			if (revert) {
				const input = document.getElementById(`checkbox-${revert.index}`);
				if (input) input.checked = revert.checked;
			}
		});

		// Checkbox updates
		socket.on('server:checkbox:change', (data) => {
			const input = document.getElementById(`checkbox-${data.index}`);
			if (input) input.checked = data.checked;
		});

		// Analytics updates
		socket.on('server:analytics:update', (data) => {
			clickCounter.textContent = data.totalClicks.toLocaleString();
		});

		window.addEventListener('load', async() => {
			const response = await fetch('/checkboxes');
			const data = await response.json();

			if (data && data.checkboxes) {
				// Use DocumentFragment to inject 10,000 DOM nodes instantly without lag
				const fragment = document.createDocumentFragment();
				
				data.checkboxes.forEach((serverValue, index) => {
					const input = document.createElement('input');
					input.type = 'checkbox';
					input.id = `checkbox-${index}`;
					input.checked = serverValue;

					input.addEventListener('change', event => {
						const checked = event.target.checked;
						socket.emit('client:checkbox:change', { index, checked });
					});
					fragment.appendChild(input);
				});
				container.appendChild(fragment);
			}
		});
	</script>
</body>
</html>
